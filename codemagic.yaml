workflows:
  ios-testflight:
    name: iOS TestFlight (React Native)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.yourname.medcare"
        APP_STORE_APPLE_ID: 1234567890
        XCODE_WORKSPACE: "ios/rn_native_base.xcworkspace"
        XCODE_SCHEME: "rn_native_base"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    cache:
      cache_paths:
        - $HOME/.npm
        - ~/.cocoapods/repos
    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up code signing on Xcode project
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo 0)
          cd $CM_BUILD_DIR/ios
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))

      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
