name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS app (no code signing)
        run: |
          xcodebuild \
            -workspace ios/rn_native_base.xcworkspace \
            -scheme rn_native_base \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ios/build \
            clean build

      - name: Package unsigned IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -R rn_native_base.app Payload/
          zip -r unsigned-rn_native_base.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: ios/build/Build/Products/Release-iphoneos/unsigned-rn_native_base.ipa
